id: anti-hardcoding-06-legit-ui-api-widening
title: "Anti-Hardcoding 06: legitimate xyn-ui + xyn-api widening"
request: >
  Add a Deal Finder command palette action that creates a data source and persists it through a new xyn-api contract endpoint.
allow_core_bypass: false
expected_artifacts:
  - xyn-ui
  - xyn-api
expected_primary_artifact: xyn-ui
optional_artifacts:
  - deal-finder-harness
forbidden_artifacts: []
accepted_dependency_reasons:
  - ui_command_requires_api_route_registration
  - api_depends_on_shared_contract
planner_expectations:
  should_use_mcp: true
  should_update_command_palette: true
  may_require_core_xyn_changes: false
  success_criteria:
    - Planner explains why xyn-api dependency is required.
    - Planner defines UI implementation and API validation steps.
  required_phrases:
    - xyn-ui
    - xyn-api
    - dependency
  forbidden_phrases:
    - ui-only
deployment:
  mode: preview
  requires_xyn_api: true
  require_branch_isolation: true
ui_checks:
  - type: command_palette_command_present
    command_text: "Create data source"
  - type: datasource_create
    datasource_name: "Deal Finder API-backed Source"
