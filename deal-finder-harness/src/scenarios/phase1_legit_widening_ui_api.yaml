id: phase1_legit_widening_ui_api
title: "Phase1 Legitimate Widening: xyn-ui + xyn-api"
request: >
  Add a Deal Finder command palette action that creates a data source and persists it through
  xyn-api, including command result feedback in the UI.
allow_core_bypass: false
expected_artifacts:
  - xyn-ui
  - xyn-api
expected_primary_artifact: xyn-ui
optional_artifacts:
  - deal-finder-harness
forbidden_artifacts: []
accepted_dependency_reasons:
  - ui_command_requires_api_route_registration
  - api_depends_on_shared_contract
artifact_selection_differ_group: phase1-core-widening-contrast
planner_expectations:
  should_use_mcp: true
  should_update_command_palette: true
  may_require_core_xyn_changes: false
  success_criteria:
    - Planner explains why API dependency is required.
    - Planner distinguishes implementation from validation.
  required_phrases:
    - xyn-ui
    - xyn-api
    - dependency
  forbidden_phrases:
    - ui-only
deployment:
  mode: preview
  requires_xyn_api: true
  require_branch_isolation: true
ui_checks:
  - type: command_palette_command_present
    command_text: "Create data source"
