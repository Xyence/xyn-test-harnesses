id: notification_lifecycle_create_get_list_pause_activate
suite: deal-finder-notification-lifecycle
title: "Deal Finder Notification Lifecycle: Create/Get/List/Pause/Activate"
request: >
  Create a Deal Finder notification rule, read and list it, then pause and re-activate it via MCP.
expected_artifacts:
  - xyn-ui
expected_primary_artifact: xyn-ui
optional_artifacts:
  - xyn-api
forbidden_artifacts: []
accepted_dependency_reasons:
  - ui_command_requires_api_route_registration
planner_expectations:
  should_use_mcp: true
  may_require_core_xyn_changes: false
  success_criteria:
    - Notification lifecycle operations are executed through MCP.
  required_phrases: []
  forbidden_phrases: []
deployment:
  mode: preview
  requires_xyn_api: true
  require_branch_isolation: false
assertions:
  expected_operations:
    - notification_rule_create
    - notification_rule_get
    - notification_rule_list
    - notification_rule_pause
    - notification_rule_activate
  expected_entities_created:
    - type: notification_rule
  expected_response_fields:
    - path: submitRequest.endpointTarget.submitEndpoint
      contains: "/mcp"
