id: phase1_minimal_command_palette_change_paraphrase_a
title: "Phase1 Minimal Paraphrase A"
request: >
  Make a small wording update so Deal Finder is easier to discover in the Xyn command palette,
  and keep the change focused on UI command text behavior.
allow_core_bypass: false
expected_artifacts:
  - xyn-ui
expected_primary_artifact: xyn-ui
optional_artifacts:
  - deal-finder-harness
forbidden_artifacts:
  - xyn-api
accepted_dependency_reasons:
  - ui_depends_on_shared_command_schema
planner_expectations:
  should_use_mcp: true
  should_update_command_palette: true
  may_require_core_xyn_changes: false
  success_criteria:
    - xyn-ui is selected for the command palette wording update.
    - Planner includes implementation and validation steps.
  required_phrases:
    - command palette
    - deal finder
  forbidden_phrases:
    - backend-only
deployment:
  mode: preview
  requires_xyn_api: false
  require_branch_isolation: true
ui_checks:
  - type: command_palette_command_present
    command_text: "Deal Finder"
