id: negative-control-docs-only
title: "Negative control: docs/process update should not pick xyn-ui"
request: >
  Update harness runbook documentation and release checklist wording for Deal Finder rollout.
allow_core_bypass: false
expected_artifacts:
  - deal-finder-harness
expected_primary_artifact: deal-finder-harness
optional_artifacts: []
forbidden_artifacts:
  - xyn-ui
accepted_dependency_reasons: []
planner_expectations:
  should_use_mcp: true
  should_update_command_palette: false
  may_require_core_xyn_changes: false
  success_criteria:
    - Selection remains in harness/documentation scope.
    - Planner does not recommend UI implementation.
  required_phrases:
    - documentation
  forbidden_phrases:
    - command palette ui implementation
deployment:
  mode: preview
  requires_xyn_api: false
  require_branch_isolation: false
ui_checks:
  - type: command_palette_command_present
    command_text: "Deal Finder"
