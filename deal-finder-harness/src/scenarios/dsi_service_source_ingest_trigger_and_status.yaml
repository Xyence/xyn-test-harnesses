id: dsi_service_source_ingest_trigger_and_status
suite: deal-finder-ingestion-smoke
title: "Deal Finder Ingestion Smoke: Service/Geocoder Source Trigger And Status"
request: >
  Configure a St. Louis service-backed source and validate ingestion orchestration visibility:
  attempt ingest trigger and verify runtime run status can be observed through MCP.
expected_artifacts:
  - xyn-api
expected_primary_artifact: xyn-api
optional_artifacts:
  - xyn-ui
forbidden_artifacts: []
accepted_dependency_reasons:
  - ui_command_requires_api_route_registration
planner_expectations:
  should_use_mcp: true
  may_require_core_xyn_changes: false
  success_criteria:
    - Planner includes service-source ingest trigger and run-status checks.
  required_phrases:
    - ingest
    - status
  forbidden_phrases: []
deployment:
  mode: preview
  requires_xyn_api: true
  require_branch_isolation: false
ingestion_smoke:
  fixture_ids:
    - csb_service_requests
  require_ingest_trigger: false
  require_status_visibility: true
  require_quality_summary: false
  verify_disable_enable_effect: false
assertions:
  expected_operations:
    - datasource_create
    - ingest_probe_started
    - ingest_trigger_attempted
    - ingest_trigger_result_recorded
    - ingest_status_probe_attempted
    - ingest_status_result_recorded
    - quality_status_probe_completed
    - ingest_probe_completed
  expected_response_fields:
    - path: submitRequest.endpointTarget.submitEndpoint
      contains: "/mcp"
