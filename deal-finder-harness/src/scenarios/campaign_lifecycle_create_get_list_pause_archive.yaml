id: campaign_lifecycle_create_get_list_pause_archive
suite: deal-finder-campaign-lifecycle
title: "Deal Finder Campaign Lifecycle: Create/Get/List/Pause/Archive"
request: >
  Create a Deal Finder campaign, read it back, list campaigns, then pause and archive it through MCP tools.
expected_artifacts:
  - xyn-ui
expected_primary_artifact: xyn-ui
optional_artifacts:
  - xyn-api
forbidden_artifacts: []
accepted_dependency_reasons:
  - ui_command_requires_api_route_registration
planner_expectations:
  should_use_mcp: true
  may_require_core_xyn_changes: false
  success_criteria:
    - Campaign lifecycle operations are executed through MCP.
  required_phrases: []
  forbidden_phrases: []
deployment:
  mode: preview
  requires_xyn_api: true
  require_branch_isolation: false
assertions:
  expected_operations:
    - campaign_create
    - campaign_get
    - campaign_list
    - campaign_pause
    - campaign_archive
  expected_entities_created:
    - type: campaign
  expected_response_fields:
    - path: submitRequest.endpointTarget.submitEndpoint
      contains: "/mcp"
